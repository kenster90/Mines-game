<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  // 1. Correct Imports from the same version
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

  // 2. Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBGa3likIWBV3YSIvy5dwou6PtjTSFfCH4",
    authDomain: "mines-game-e0ff2.firebaseapp.com",
    projectId: "mines-game-e0ff2",
    storageBucket: "mines-game-e0ff2.firebasestorage.app",
    messagingSenderId: "128077318486",
    appId: "1:128077318486:web:f2b09ee60a2bf1cdf7aef7",
    measurementId: "G-7TY6CWMBC1"
  };

  // 3. Initialize Services
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const functions = getFunctions(app);

  const _startGameFn   = httpsCallable(functions, 'startGame');
  const _resolveGameFn = httpsCallable(functions, 'resolveGame');

  // 4. Attach Helper to Window
  window._fb = {
    async register(email, password, username) {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid  = cred.user.uid;
      const result = await httpsCallable(functions, 'createUser')({ username, email });
      return { uid, ...result.data };
    },
    async login(email, password) {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db, "users", cred.user.uid));
      if (!snap.exists()) throw new Error("no-data");
      return { uid: cred.user.uid, ...snap.data() };
    },
    async logout() { await signOut(auth); },
    async getUserData(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() ? { uid, ...snap.data() } : null;
    },
    async saveUserMeta(uid, data) {
      const safe = { ...data };
      delete safe.balanceCents;
      await updateDoc(doc(db, "users", uid), safe);
    },
    async startGame(betCents, mineCount) {
      const r = await _startGameFn({ betCents, mineCount });
      return r.data;
    },
    async resolveGame(gameId, action, cellIndex) {
      const r = await _resolveGameFn({ gameId, action, cellIndex });
      return r.data;
    }
  };

  // 5. Auth Observer
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const data = await window._fb.getUserData(user.uid);
      if (data && window._onFirebaseUser) window._onFirebaseUser(data);
      else if (window._showAuth) window._showAuth();
    } else {
      if (window._showAuth) window._showAuth();
    }
  });
</script>

<style>
  :root {
    --bg:#0a0a0f; --surface:#111118; --panel:#16161f; --border:#2a2a3a;
    --accent:#00e5a0; --accent-dim:rgba(0,229,160,0.12);
    --danger:#ff3d5a; --danger-dim:rgba(255,61,90,0.12);
    --gold:#f5c842; --gold-dim:rgba(245,200,66,0.12);
    --text:#e8e8f0; --muted:#6b6b88;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:20px;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
    background:radial-gradient(ellipse at 60% 20%,rgba(0,229,160,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 20% 80%,rgba(100,80,255,0.04) 0%,transparent 50%);
    pointer-events:none;z-index:0;}

  /* UI COMPONENT STYLES */
  #loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;
    align-items:center;justify-content:center;z-index:500;}
  #loadingScreen.hidden{display:none;}
  .loader{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:6px;
    color:var(--accent);animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}

  #authScreen{position:fixed;inset:0;background:var(--bg);display:flex;
    align-items:center;justify-content:center;z-index:200;padding:20px;}
  #authScreen.hidden{display:none;}
  .auth-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:36px 32px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:18px;}
  .auth-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:8px;
    color:var(--text);line-height:1;text-align:center;}
  .auth-logo span{color:var(--accent);}
  .auth-subtitle{text-align:center;font-size:11px;color:var(--muted);letter-spacing:3px;margin-top:-12px;}
  .auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);
    border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .auth-tab{padding:11px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:16px;
    letter-spacing:2px;cursor:pointer;color:var(--muted);transition:all 0.2s;border:none;background:transparent;}
  .auth-tab.active{background:var(--accent);color:#0a0a0f;}
  .auth-field{display:flex;flex-direction:column;gap:6px;}
  .auth-field label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .auth-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;
    outline:none;transition:border-color 0.2s;}
  .auth-input:focus{border-color:var(--accent);}
  .auth-error{font-size:11px;color:var(--danger);letter-spacing:1px;min-height:16px;text-align:center;}
  .btn-auth{background:var(--accent);color:#0a0a0f;border:none;border-radius:8px;padding:14px;
    font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;
    transition:all 0.15s;box-shadow:0 4px 20px rgba(0,229,160,0.25);}
  .btn-auth:disabled{opacity:0.5;cursor:not-allowed;}

  .wrapper{position:relative;z-index:1;width:100%;max-width:940px;
    display:grid;grid-template-columns:290px 1fr;gap:20px;align-items:start;}
  .top-bar{grid-column:1/-1;display:flex;align-items:center;
    justify-content:space-between;margin-bottom:6px;}
  .logo h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;color:var(--text);line-height:1;}
  .user-chip{display:flex;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
  .btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);
    font-size:10px;padding:5px 10px;border-radius:5px;cursor:pointer;}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:22px;display:flex;flex-direction:column;gap:20px;}
  .balance-amount{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);}
  .bet-input-row{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .bet-input-row input{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:12px 14px;}

  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .cell{aspect-ratio:1;border-radius:9px;background:var(--surface);border:1px solid var(--border);
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:0.15s;}
  .cell.gem{background:rgba(0,229,160,0.1);border-color:var(--accent);}
  .cell.mine-hit{background:rgba(255,61,90,0.22);border-color:var(--danger);}
  .cell.no-hover{cursor:default;}

  .overlay{display:none;position:absolute;inset:0;border-radius:12px;
    background:rgba(10,10,15,0.88);backdrop-filter:blur(4px);
    align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:10;}
  .overlay.show{display:flex;}
  .toast{position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 26px;
    z-index:400;transition:transform 0.4s;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="loadingScreen"><div class="loader">LOADING...</div></div>
<div class="toast" id="toast"></div>

<div id="authScreen" class="hidden">
  <div class="auth-box">
    <div class="auth-logo">MINES<span>.</span></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div class="auth-field" id="usernameField" style="display:none">
      <label>Display Name</label>
      <input class="auth-input" id="authName" type="text" placeholder="your_name">
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input class="auth-input" id="authEmail" type="email" placeholder="you@email.com">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input class="auth-input" id="authPass" type="password" placeholder="••••••••">
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn-auth" id="authBtn" onclick="handleAuth()">LOGIN</button>
  </div>
</div>

<div class="wrapper" id="gameWrapper" style="display:none;">
  <div class="top-bar">
    <div class="logo"><h1>MINES</h1></div>
    <div class="user-chip">
      <div>
        <div class="uname" id="chipUser">—</div>
        <div class="ugames" id="chipGames">0 games played</div>
      </div>
      <button class="btn-logout" onclick="logoutUser()">LOGOUT</button>
    </div>
  </div>

  <div class="panel">
    <div class="balance-display">
      <div class="balance-amount" id="balanceAmt">1,000.00</div>
      <div style="font-size:10px; color:var(--muted)">COINS</div>
    </div>
    <div>
      <div class="bet-input-row">
        <input type="number" id="betInput" value="50">
      </div>
    </div>
    <div>
      <input type="range" id="mineSlider" min="1" max="24" value="3" oninput="updateMineCount(this.value)">
      <div id="mineCountDisp">3 Mines</div>
    </div>
    <button class="btn-auth" id="startBtn" onclick="startGame()">START GAME</button>
    <button class="btn-auth" id="cashoutBtn" onclick="cashout()" style="display:none; background:var(--gold)">CASH OUT</button>
  </div>

  <div class="game-area">
    <div class="grid-container" id="gridContainer" style="position:relative;">
      <div class="grid" id="grid"></div>
      <div class="overlay show" id="overlay">
        <div id="overlayTitle" style="font-size:40px; font-family:'Bebas Neue'">MINES</div>
        <div id="overlaySub">Set bet and start</div>
      </div>
    </div>
  </div>
</div>

<script>
// Game State
let balance = 0;
let gameId = null;
let currentBet = 0;
let currentMines = 3;
let gemsRevealedCount = 0;
let gameActive = false;
let clickLocked = false;
let revealedCells = new Set();
let revealedIsMine = new Map();
let mineIndices = null;
let currentUser = null;
let currentTab = 'login';

// Helpers
const fmtCoins = (cents) => (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2 });
const updateBalanceUI = () => document.getElementById('balanceAmt').textContent = fmtCoins(balance);

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('usernameField').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('authBtn').textContent = tab === 'login' ? 'LOGIN' : 'CREATE ACCOUNT';
}

function updateMineCount(v) {
  currentMines = parseInt(v);
  document.getElementById('mineCountDisp').textContent = v + " Mines";
}

// Logic Hooks
window._onFirebaseUser = function(data) {
  currentUser = data;
  balance = data.balanceCents || 100000;
  document.getElementById('loadingScreen').classList.add('hidden');
  enterGame();
};

window._showAuth = function() {
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
};

async function handleAuth() {
  const email = document.getElementById('authEmail').value;
  const pass = document.getElementById('authPass').value;
  const name = document.getElementById('authName').value;
  try {
    if (currentTab === 'register') {
      await window._fb.register(email, pass, name);
    } else {
      await window._fb.login(email, pass);
    }
  } catch(e) {
    document.getElementById('authError').textContent = e.message.toUpperCase();
  }
}

function enterGame() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('gameWrapper').style.display = 'grid';
  document.getElementById('chipUser').textContent = (currentUser.username || currentUser.email).toUpperCase();
  updateBalanceUI();
  renderGrid();
}

async function logoutUser() {
  await window._fb.logout();
  location.reload();
}

function renderGrid(mode = 'normal') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    if (revealedCells.has(i)) {
      cell.classList.add('no-hover');
      cell.textContent = revealedIsMine.get(i) ? '💣' : '💎';
      if (revealedIsMine.get(i)) cell.classList.add('mine-hit');
      else cell.classList.add('gem');
    } else {
      cell.onclick = () => revealCell(i);
    }
    grid.appendChild(cell);
  }
}

async function startGame() {
  const bet = parseFloat(document.getElementById('betInput').value);
  const betCents = Math.round(bet * 100);
  if (betCents > balance) return showToast("INSUFFICIENT FUNDS");

  try {
    const res = await window._fb.startGame(betCents, currentMines);
    gameId = res.gameId;
    balance = res.newBalanceCents;
    currentBet = betCents;
    gameActive = true;
    revealedCells.clear();
    revealedIsMine.clear();
    gemsRevealedCount = 0;
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('cashoutBtn').style.display = 'block';
    updateBalanceUI();
    renderGrid();
  } catch(e) { showToast(e.message); }
}

async function revealCell(index) {
  if (!gameActive || clickLocked) return;
  clickLocked = true;
  try {
    const res = await window._fb.resolveGame(gameId, 'reveal', index);
    revealedCells.add(index);
    revealedIsMine.set(index, res.isMine);
    if (res.isMine) {
      gameActive = false;
      showToast("BOOM!", "lose");
      setTimeout(() => document.getElementById('overlay').classList.add('show'), 1000);
    } else {
      gemsRevealedCount++;
    }
    renderGrid();
  } catch(e) { showToast("ERROR"); }
  clickLocked = false;
}

async function cashout() {
  try {
    const res = await window._fb.resolveGame(gameId, 'cashout', -1);
    balance = res.newBalanceCents;
    gameActive = false;
    updateBalanceUI();
    showToast("WINNER!");
    document.getElementById('overlay').classList.add('show');
    document.getElementById('cashoutBtn').style.display = 'none';
  } catch(e) { showToast("ERROR"); }
}
</script>
</body>
</html>
