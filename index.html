<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MINES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import {
    getAuth, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getFunctions, httpsCallable
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBGa3likIWBV3YSIvy5dwou6PtjTSFfCH4",
    authDomain:        "mines-game-e0ff2.firebaseapp.com",
    projectId:         "mines-game-e0ff2",
    storageBucket:     "mines-game-e0ff2.firebasestorage.app",
    messagingSenderId: "128077318486",
    appId:             "1:128077318486:web:f2b09ee60a2bf1cdf7aef7",
    measurementId:     "G-7TY6CWMBC1"
  };

  const app       = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth      = getAuth(app);
  const db        = getFirestore(app);
  const functions = getFunctions(app);

  const _fnCreateUser  = httpsCallable(functions, 'createUser');
  const _fnStartGame   = httpsCallable(functions, 'startGame');
  const _fnRevealCell  = httpsCallable(functions, 'revealCell');
  const _fnCashout     = httpsCallable(functions, 'cashout');
  const _fnBust        = httpsCallable(functions, 'bust');

  window._fb = {
    async register(email, password, username) {
      const cred   = await createUserWithEmailAndPassword(auth, email, password);
      const result = await _fnCreateUser({ username, email });
      return { uid: cred.user.uid, ...result.data };
    },
    async login(email, password) {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db, "users", cred.user.uid));
      if (!snap.exists()) throw new Error("no-data");
      return { uid: cred.user.uid, ...snap.data() };
    },
    async logout() { await signOut(auth); },
    async getUserData(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() ? { uid, ...snap.data() } : null;
    },
    async saveUserMeta(uid, data) {
      const safe = { ...data };
      delete safe.balanceCents;
      await updateDoc(doc(db, "users", uid), safe);
    },
    async startGame(betCents, mineCount) {
      const r = await _fnStartGame({ betCents, mineCount });
      return r.data;
    },
    async revealCell(gameId, cellIndex) {
      const r = await _fnRevealCell({ gameId, cellIndex });
      return r.data;
    },
    async cashout(gameId) {
      const r = await _fnCashout({ gameId });
      return r.data;
    },
    async bust(gameId) {
      const r = await _fnBust({ gameId });
      return r.data;
    },
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const data = await window._fb.getUserData(user.uid);
      if (data && window._onFirebaseUser) window._onFirebaseUser(data);
      else if (window._showAuth) window._showAuth();
    } else {
      if (window._showAuth) window._showAuth();
    }
  });
</script>

<style>
:root {
  --bg:         #0a0a0f;
  --surface:    #111118;
  --panel:      #16161f;
  --border:     #2a2a3a;
  --accent:     #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --danger:     #ff3d5a;
  --danger-dim: rgba(255,61,90,0.12);
  --gold:       #f5c842;
  --gold-dim:   rgba(245,200,66,0.12);
  --text:       #e8e8f0;
  --muted:      #6b6b88;
  --radius:     10px;
  --gap:        12px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  overflow-x: hidden;
}

#loadingScreen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 500;
}
#loadingScreen.hidden { display: none; }
.loader {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  letter-spacing: 6px; color: var(--accent);
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

#authScreen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px; overflow-y: auto;
}
#authScreen.hidden { display: none; }

.auth-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 16px;
}
.auth-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px; letter-spacing: 8px;
  color: var(--text); line-height: 1; text-align: center;
}
.auth-logo span { color: var(--accent); }
.auth-tabs {
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.auth-tab {
  padding: 12px; text-align: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px;
  cursor: pointer; color: var(--muted); transition: all 0.2s;
  border: none; background: transparent; min-height: 44px;
}
.auth-tab.active { background: var(--accent); color: #0a0a0f; }

.auth-input {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px;
  color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 16px; width: 100%;
}

.btn-auth {
  background: var(--accent); color: #0a0a0f;
  border: none; border-radius: 8px; padding: 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px;
  cursor: pointer; min-height: 52px; width: 100%;
}

#gameWrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 960px;
  display: none; flex-direction: column; gap: var(--gap);
}

.top-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 5px; color: var(--text); }

.user-chip { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; }
.uname { font-size: 11px; color: var(--accent); }

.game-layout { display: flex; flex-direction: column; gap: var(--gap); }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }

.balance-amount { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--gold); }
.mult-value { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); }

.bet-input-row { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.bet-input-row input { flex: 1; background: transparent; border: none; color: var(--text); padding: 12px; font-size: 16px; outline: none; }

.btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; }
.btn-start { background: var(--accent); color: #0a0a0f; }
.btn-cashout { background: var(--gold); color: #0a0a0f; display: none; }
.btn-cashout.visible { display: block; }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.cell { aspect-ratio: 1; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: transform 0.1s; }
.cell.gem { background: rgba(0,229,160,0.1); border-color: var(--accent); }
.cell.mine-hit { background: rgba(255,61,90,0.22); border-color: var(--danger); }
.cell.mine-hidden { background: rgba(255,61,90,0.07); opacity: 0.6; }

.overlay { display: none; position: absolute; inset: 0; background: rgba(10,10,15,0.9); align-items: center; justify-content: center; flex-direction: column; z-index: 10; border-radius: 10px; }
.overlay.show { display: flex; }
.overlay-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; }

.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--panel); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; transition: transform 0.3s; z-index: 1000; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.win { color: var(--gold); }
.toast.lose { color: var(--danger); }

@media (min-width: 700px) {
  .game-layout { grid-template-columns: 280px 1fr; display: grid; }
}
</style>
</head>
<body>

<div id="loadingScreen"><div class="loader">LOADING...</div></div>
<div class="toast" id="toast"></div>

<div id="authScreen" class="hidden">
  <div class="auth-box">
    <div class="auth-logo">MINES<span>.</span></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div id="usernameField" style="display:none"><input class="auth-input" id="authName" type="text" placeholder="Display Name"></div>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email">
    <input class="auth-input" id="authPass" type="password" placeholder="Password">
    <div id="authError" style="color:var(--danger); font-size:10px; text-align:center"></div>
    <button class="btn-auth" id="authBtn" onclick="handleAuth()">LOGIN</button>
  </div>
</div>

<div id="gameWrapper">
  <div class="top-bar">
    <div class="logo"><h1>MINES</h1></div>
    <div class="user-chip">
      <div class="uname" id="chipUser">—</div>
      <button onclick="logoutUser()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer">LOGOUT</button>
    </div>
  </div>

  <div class="game-layout">
    <div class="panel">
      <div class="panel-row">
        <div><div class="balance-amount" id="balanceAmt">0.00</div><div style="font-size:9px; color:var(--muted)">COINS</div></div>
        <div><div class="mult-value" id="multValue">1.00×</div><div id="profitAmt" style="font-size:11px; color:var(--accent)">+0.00</div></div>
      </div>
      <div class="bet-input-row"><input type="number" id="betInput" value="10" step="1"></div>
      <input type="range" id="mineSlider" min="1" max="24" value="3" oninput="updateMineCount(this.value)">
      <div style="text-align:center; font-size:12px">Mines: <span id="mineCountDisp">3</span></div>
      <button class="btn btn-start" id="startBtn" onclick="startGame()">START GAME</button>
      <button class="btn btn-cashout" id="cashoutBtn" onclick="doCashout()">CASH OUT</button>
    </div>

    <div class="game-area" style="position:relative">
      <div class="grid" id="grid"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">MINES</div>
        <div id="overlaySub" style="color:var(--muted); font-size:12px">Set bet and start</div>
      </div>
    </div>
  </div>
</div>

<script>
const GRID_SIZE = 25;
let gameId = null;
let balance = 0;
let gameActive = false;
let currentBet = 0;
let currentMines = 3;
let gemsRevealedCount = 0;
let revealedCells = new Set();
let mineIndices = null;
let currentUser = null;

function fmtCoins(cents) { return (cents / 100).toFixed(2); }
function coinsToCents(c) { return Math.round(c * 100); }

function updateBalanceUI() { document.getElementById('balanceAmt').textContent = fmtCoins(balance); }
function updateMineCount(v) { currentMines = parseInt(v); document.getElementById('mineCountDisp').textContent = v; }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

window._onFirebaseUser = function(data) {
  currentUser = data;
  balance = data.balanceCents;
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('gameWrapper').style.display = 'flex';
  document.getElementById('chipUser').textContent = data.username.toUpperCase();
  updateBalanceUI();
  renderGrid();
};

window._showAuth = function() {
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
};

async function handleAuth() {
  const email = document.getElementById('authEmail').value;
  const pass = document.getElementById('authPass').value;
  const name = document.getElementById('authName').value;
  try {
    if (document.getElementById('usernameField').style.display === 'none') {
      await window._fb.login(email, pass);
    } else {
      await window._fb.register(email, pass, name);
    }
  } catch(e) { document.getElementById('authError').textContent = e.message; }
}

function switchTab(t) {
  document.getElementById('usernameField').style.display = t === 'register' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', t === 'login');
  document.getElementById('tabRegister').classList.toggle('active', t === 'register');
}

async function startGame() {
  const bet = parseFloat(document.getElementById('betInput').value);
  if (bet * 100 > balance) return showToast("Low Balance", "lose");
  
  const btn = document.getElementById('startBtn');
  btn.disabled = true;

  try {
    const res = await window._fb.startGame(coinsToCents(bet), currentMines);
    gameId = res.gameId;
    balance = res.newBalanceCents;
    currentBet = coinsToCents(bet);
    gameActive = true;
    gemsRevealedCount = 0;
    revealedCells.clear();
    mineIndices = null;
    
    updateBalanceUI();
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('cashoutBtn').classList.add('visible');
    renderGrid();
  } catch(e) { showToast("Error starting", "lose"); btn.disabled = false; }
}

async function revealCell(idx) {
  if (!gameActive || revealedCells.has(idx)) return;
  
  try {
    const res = await window._fb.revealCell(gameId, idx);
    revealedCells.add(idx);
    
    if (res.isMine) {
      gameActive = false;
      mineIndices = res.mineIndices;
      renderGrid();
      showEnd(false);
    } else {
      gemsRevealedCount++;
      renderGrid();
      if (res.done) doCashout();
    }
  } catch(e) { console.error(e); }
}

async function doCashout() {
  if (!gameActive || gemsRevealedCount === 0) return;
  
  gameActive = false;
  const gid = gameId;
  gameId = null;
  document.getElementById('cashoutBtn').classList.remove('visible');

  try {
    const res = await window._fb.cashout(gid);
    balance = res.newBalanceCents;
    mineIndices = res.mineIndices;
    
    updateBalanceUI();
    renderGrid();
    showEnd(true, res.winCents, res.multiplier);
  } catch(e) {
    showToast("Cashout error", "lose");
    const fresh = await window._fb.getUserData(currentUser.uid);
    if (fresh) { balance = fresh.balanceCents; updateBalanceUI(); }
  }
}

function showEnd(won, winCents, mult) {
  const title = document.getElementById('overlayTitle');
  const sub = document.getElementById('overlaySub');
  
  if (won) {
    title.textContent = "+ " + fmtCoins(winCents);
    title.style.color = "var(--gold)";
    sub.textContent = mult + "x Multiplier";
    showToast("Winner!", "win");
  } else {
    title.textContent = "BOOM";
    title.style.color = "var(--danger)";
    sub.textContent = "Better luck next time";
    showToast("Lost bet", "lose");
  }
  
  document.getElementById('overlay').classList.add('show');
  document.getElementById('startBtn').disabled = false;
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let i = 0; i < GRID_SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    if (revealedCells.has(i)) {
      if (mineIndices && mineIndices.includes(i)) {
        c.classList.add('mine-hit'); c.textContent = '💣';
      } else {
        c.classList.add('gem'); c.textContent = '💎';
      }
    } else if (mineIndices) {
      if (mineIndices.includes(i)) { c.classList.add('mine-hidden'); c.textContent = '💣'; }
      else { c.textContent = '💎'; c.style.opacity = '0.3'; }
    } else {
      c.onclick = () => revealCell(i);
    }
    g.appendChild(c);
  }
}

async function logoutUser() { await window._fb.logout(); location.reload(); }
</script>
</body>
</html>
