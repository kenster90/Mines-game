<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VAULT — Casino Games</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
  import {
    getAuth, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBGa3likIWBV3YSIvy5dwou6PtjTSFfCH4",
    authDomain:        "mines-game-e0ff2.firebaseapp.com",
    projectId:         "mines-game-e0ff2",
    storageBucket:     "mines-game-e0ff2.firebasestorage.app",
    messagingSenderId: "128077318486",
    appId:             "1:128077318486:web:f2b09ee60a2bf1cdf7aef7",
    measurementId:     "G-7TY6CWMBC1"
  };

  const app       = initializeApp(firebaseConfig);
  const auth      = getAuth(app);
  const db        = getFirestore(app);
  const functions = getFunctions(app);

  const _fnCreateUser  = httpsCallable(functions, 'createUser');
  const _fnStartGame   = httpsCallable(functions, 'startGame');
  const _fnRevealCell  = httpsCallable(functions, 'revealCell');
  const _fnCashout     = httpsCallable(functions, 'cashout');
  const _fnBust        = httpsCallable(functions, 'bust');
  const _fnSimpleGame  = httpsCallable(functions, 'simpleGame');

  window._fb = {
    async register(email, password, username) {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const result = await _fnCreateUser({ username, email });
      return { uid: cred.user.uid, ...result.data };
    },
    async login(email, password) {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db, "users", cred.user.uid));
      if (!snap.exists()) throw new Error("no-data");
      return { uid: cred.user.uid, ...snap.data() };
    },
    async logout() { await signOut(auth); },
    async getUserData(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() ? { uid, ...snap.data() } : null;
    },
    async saveUserMeta(uid, data) {
      const safe = { ...data }; delete safe.balanceCents;
      await updateDoc(doc(db, "users", uid), safe);
    },
    async startGame(betCents, mineCount) { return (await _fnStartGame({ betCents, mineCount })).data; },
    async revealCell(gameId, cellIndex)  { return (await _fnRevealCell({ gameId, cellIndex })).data; },
    async cashout(gameId)                { return (await _fnCashout({ gameId })).data; },
    async bust(gameId)                   { return (await _fnBust({ gameId })).data; },
    async simpleGame(type, betCents, choice) {
      return (await _fnSimpleGame({ type, betCents, choice })).data;
    },
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const data = await window._fb.getUserData(user.uid);
      if (data && window._onFirebaseUser) window._onFirebaseUser(data);
      else if (window._showAuth) window._showAuth();
    } else {
      if (window._showAuth) window._showAuth();
    }
  });
</script>

<style>
/* ═══════════════════════
   TOKENS & CORE
═══════════════════════ */
:root {
  --bg:         #0a0a0f;
  --surface:    #111118;
  --panel:      #16161f;
  --border:     #2a2a3a;
  --accent:     #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --danger:     #ff3d5a;
  --danger-dim: rgba(255,61,90,0.12);
  --gold:       #f5c842;
  --gold-dim:   rgba(245,200,66,0.12);
  --purple:     #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --blue:       #3b82f6;
  --blue-dim:   rgba(59,130,246,0.12);
  --text:       #e8e8f0;
  --muted:      #6b6b88;
  --radius:     10px;
  --gap:        12px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100%; display: flex; flex-direction: column;
  align-items: center; padding: 0; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════
   LOADING & AUTH
═══════════════════════ */
#loadingScreen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 500;
}
#loadingScreen.hidden { display: none; }
.loader {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  letter-spacing: 6px; color: var(--accent); animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

#authScreen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 20px; overflow-y: auto;
}
#authScreen.hidden { display: none; }
.auth-box {
  background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px 24px; width: 100%; max-width: 380px;
  display: flex; flex-direction: column; gap: 16px;
}
.auth-logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 8px;
  color: var(--text); line-height: 1; text-align: center;
}
.auth-logo span { color: var(--accent); }
.auth-tabs {
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.auth-tab {
  padding: 12px; text-align: center; font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; cursor: pointer; color: var(--muted);
  transition: all 0.2s; border: none; background: transparent; min-height: 44px;
}
.auth-tab.active { background: var(--accent); color: #0a0a0f; }
.auth-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; color: var(--text); font-family: 'DM Mono', monospace; width: 100%;
}
.btn-auth {
  background: var(--accent); color: #0a0a0f; border: none; border-radius: 8px;
  padding: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 18px;
  cursor: pointer; width: 100%; min-height: 52px;
}

/* ═══════════════════════
   SITE SHELL & NAV
═══════════════════════ */
#siteWrapper { display: none; flex-direction: column; width: 100%; min-height: 100vh; }

.nav {
  background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px; position: sticky; top: 0; z-index: 50;
  gap: 10px;
}
.nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); }
.nav-brand span { color: var(--accent); }

.nav-games {
  display: flex; gap: 4px; overflow-x: auto; flex: 1;
  scrollbar-width: none; -ms-overflow-style: none;
}
.nav-games::-webkit-scrollbar { display: none; }

.nav-btn {
  background: transparent; border: 1px solid transparent; color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 12px;
  border-radius: 6px; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; min-height: 36px; -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { background: var(--surface); border-color: var(--border); color: var(--text); }

.nav-user { display: flex; align-items: center; gap: 10px; }
.nav-balance { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); }
.nav-username { font-size: 10px; color: var(--accent); max-width: 80px; overflow: hidden; white-space: nowrap; }

/* ═══════════════════════
   LAYOUT & SHARED
═══════════════════════ */
.page-content { padding: 16px; width: 100%; max-width: 980px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--gap); }

.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }

.balance-display { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.balance-amount { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--gold); line-height: 1; }

.bet-input-row { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.bet-input-row input { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'DM Mono', monospace; padding: 12px 10px; }

.btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 18px; cursor: pointer; min-height: 52px; -webkit-tap-highlight-color: transparent; }
.btn-green  { background: var(--accent); color: #0a0a0f; }
.btn-gold   { background: var(--gold);   color: #0a0a0f; display:none; }
.btn-gold.visible { display: block; }
.btn-purple { background: var(--purple); color: #fff; }

.game-page { display: none; }
.game-page.active { display: flex; flex-direction: column; gap: var(--gap); }

/* ═══════════════════════
   MINES SPECIFIC
═══════════════════════ */
.grid-container { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; position: relative; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.cell {
  aspect-ratio: 1; border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: clamp(18px, 5vw, 28px); -webkit-tap-highlight-color: transparent;
}
.cell.gem { background: rgba(0,229,160,0.1); border-color: var(--accent); }
.cell.mine-hit { background: rgba(255,61,90,0.22); border-color: var(--danger); }
.cell.no-hover { cursor: default; }

.overlay { display: none; position: absolute; inset: 0; background: rgba(10,10,15,0.88); backdrop-filter: blur(4px); align-items: center; justify-content: center; flex-direction: column; gap: 6px; z-index: 10; padding: 16px; text-align: center; }
.overlay.show { display: flex; }
.overlay-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 8vw, 42px); }

/* ═══════════════════════
   CRATE & COIN SPECIFIC
═══════════════════════ */
.crate-display { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; position: relative; overflow: hidden; min-height: 240px; justify-content: center; }
.reel-viewport { width: 100%; overflow: hidden; border-radius: 8px; position: relative; height: 100px; border: 1px solid var(--border); }
.reel-track { display: flex; align-items: center; gap: 6px; padding: 8px 6px; }
.reel-item { flex-shrink: 0; width: 84px; height: 84px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 32px; background: var(--panel); }

.coin-arena { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); min-height: 200px; justify-content: center; }
.coin { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; }
.coin-face { position: absolute; inset: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 42px; border: 3px solid; backface-visibility: hidden; }
.coin-tails { transform: rotateY(180deg); }

/* ═══════════════════════
   MOBILE OPTIMIZATIONS
═══════════════════════ */
@media (max-width: 768px) {
  .nav-btn { min-height: 44px; padding: 8px 12px; font-size: 12px; }
  .nav-brand { font-size: 22px; }
  .grid { gap: 4px; }
  .cell { min-height: 44px; }
  .page-content { padding: 12px; }
  .panel-row { grid-template-columns: 1fr; }
  .game-layout { display: flex !important; flex-direction: column !important; }
}

@media (min-width: 769px) {
  .game-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; align-items: start; }
}

@media (hover: hover) {
  .cell:hover:not(.no-hover) { border-color: rgba(255,255,255,0.2); background: #1e1e2a; transform: scale(1.04); }
  .nav-btn:hover { color: var(--text); border-color: var(--border); }
}
.cell:active:not(.no-hover) { transform: scale(0.94); background: #1e1e2a; }
</style>
</head>
<body>

<div id="loadingScreen"><div class="loader">LOADING...</div></div>
<div class="toast" id="toast"></div>

<div id="authScreen" class="hidden">
  <div class="auth-box">
    <div class="auth-logo">VAULT<span>.</span></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">REGISTER</button>
    </div>
    <div class="auth-field" id="usernameField" style="display:none">
      <input class="auth-input" id="authName" type="text" placeholder="Display Name">
    </div>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email">
    <input class="auth-input" id="authPass" type="password" placeholder="Password">
    <div class="auth-error" id="authError"></div>
    <button class="btn-auth" id="authBtn" onclick="handleAuth()">LOGIN</button>
  </div>
</div>

<div id="siteWrapper">
  <nav class="nav">
    <div class="nav-brand">VAULT<span>.</span></div>
    <div class="nav-games">
      <button class="nav-btn active" id="navMines" onclick="switchGame('mines')">💣 MINES</button>
      <button class="nav-btn" id="navCrate" onclick="switchGame('crate')">📦 CRATES</button>
      <button class="nav-btn" id="navCoin" onclick="switchGame('coin')">🪙 COINFLIP</button>
    </div>
    <div class="nav-user">
      <div style="text-align:right">
        <div class="nav-balance" id="navBalance">0.00</div>
        <div class="nav-username" id="navUser">—</div>
      </div>
      <button class="btn-nav-logout" onclick="logoutUser()">OUT</button>
    </div>
  </nav>

  <div class="page-content">
    <div class="game-page active" id="pageMines">
      <div class="game-layout">
        <div class="panel">
          <div class="balance-display">
            <div class="balance-amount" id="mBalanceAmt">0.00</div>
          </div>
          <div class="bet-input-row">
            <input type="number" id="mBetInput" value="50" step="0.01">
          </div>
          <input type="range" id="mMineSlider" min="1" max="24" value="3" oninput="mUpdateMineCount(this.value)">
          <div id="mMultValue" style="text-align:center;font-size:24px;color:var(--accent)">1.00×</div>
          <button class="btn btn-green" id="mStartBtn" onclick="mStartGame()">START</button>
          <button class="btn btn-gold" id="mCashoutBtn" onclick="mCashout()">CASH OUT</button>
        </div>
        <div class="grid-container">
          <div class="grid" id="mGrid"></div>
          <div class="overlay show" id="mOverlay">
            <div class="overlay-title">MINES</div>
            <button class="btn btn-green" style="width:auto;padding:10px 30px" onclick="mStartGame()">PLAY</button>
          </div>
        </div>
      </div>
    </div>

    <div class="game-page" id="pageCrate">
      <div class="game-layout">
        <div class="panel">
          <div class="balance-display"><div class="balance-amount" id="cBalanceAmt">0.00</div></div>
          <div class="bet-input-row"><input type="number" id="cBetInput" value="100"></div>
          <button class="btn btn-purple" id="cOpenBtn" onclick="cOpenCrate()">OPEN CRATE</button>
        </div>
        <div class="crate-display" id="crateDisplay">📦 READY</div>
      </div>
    </div>

    <div class="game-page" id="pageCoin">
      <div class="game-layout">
        <div class="panel">
          <div class="balance-display"><div class="balance-amount" id="flBalanceAmt">0.00</div></div>
          <div class="bet-input-row"><input type="number" id="flBetInput" value="50"></div>
          <div style="display:flex;gap:10px">
            <button class="btn" id="flPickHeads" onclick="flPick('heads')" style="background:var(--gold-dim);color:var(--gold)">HEADS</button>
            <button class="btn" id="flPickTails" onclick="flPick('tails')" style="background:var(--blue-dim);color:var(--blue)">TAILS</button>
          </div>
          <button class="btn btn-green" id="flFlipBtn" onclick="flFlip()">FLIP</button>
        </div>
        <div class="coin-arena">
          <div class="coin" id="flCoin">
            <div class="coin-face" style="background:var(--gold-dim);border-color:var(--gold)">🌕</div>
            <div class="coin-face coin-tails" style="background:var(--blue-dim);border-color:var(--blue)">🌑</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null, balance = 0, currentTab = 'login', currentGame = 'mines';

const coinsToCents = (c) => Math.round(c * 100);
const fmtCoins = (cents) => (cents/100).toLocaleString('en-US',{minimumFractionDigits:2});

function updateAllBalances() {
  const f = fmtCoins(balance);
  ['mBalanceAmt','cBalanceAmt','flBalanceAmt','navBalance'].forEach(id => {
    const el = document.getElementById(id); if(el) el.textContent = f;
  });
}

function switchGame(name) {
  currentGame = name;
  ['mines','crate','coin'].forEach(g => {
    const btn = document.getElementById('nav' + g.charAt(0).toUpperCase() + g.slice(1));
    const page = document.getElementById('page' + g.charAt(0).toUpperCase() + g.slice(1));
    if(btn) btn.classList.toggle('active', g === name);
    if(page) page.classList.toggle('active', g === name);
  });
  window.scrollTo(0,0);
}

// AUTH HANDLERS
window._onFirebaseUser = (data) => {
  currentUser = data; balance = data.balanceCents || 100000;
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('siteWrapper').style.display = 'flex';
  document.getElementById('navUser').textContent = data.username.toUpperCase();
  updateAllBalances();
  mRenderGrid();
};

window._showAuth = () => {
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
};

async function handleAuth() {
  const email = document.getElementById('authEmail').value, pass = document.getElementById('authPass').value;
  try {
    if(currentTab === 'register') await window._fb.register(email, pass, document.getElementById('authName').value);
    else await window._fb.login(email, pass);
  } catch(e) { document.getElementById('authError').textContent = e.message.toUpperCase(); }
}

function switchTab(t) {
  currentTab = t;
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabRegister').classList.toggle('active', t==='register');
  document.getElementById('usernameField').style.display = t==='register' ? 'block' : 'none';
}

// MINES LOGIC
let mGameActive = false, mRevealed = new Set(), mMineIndices = null, mGameId = null;
function mRenderGrid() {
  const g = document.getElementById('mGrid'); g.innerHTML = '';
  for(let i=0; i<25; i++) {
    const c = document.createElement('div'); c.className = 'cell';
    if(mRevealed.has(i)) {
        c.classList.add('no-hover', mMineIndices?.includes(i) ? 'mine-hit' : 'gem');
        c.textContent = mMineIndices?.includes(i) ? '💣' : '💎';
    } else {
        c.onclick = () => mRevealCell(i);
    }
    g.appendChild(c);
  }
}

async function mStartGame() {
  const bet = coinsToCents(document.getElementById('mBetInput').value);
  const mines = parseInt(document.getElementById('mMineSlider').value);
  try {
    const r = await window._fb.startGame(bet, mines);
    mGameId = r.gameId; balance = r.newBalanceCents; mGameActive = true;
    mRevealed.clear(); mMineIndices = null;
    document.getElementById('mOverlay').classList.remove('show');
    document.getElementById('mCashoutBtn').classList.add('visible');
    updateAllBalances(); mRenderGrid();
  } catch(e) { alert(e.message); }
}

async function mRevealCell(i) {
  if(!mGameActive || mRevealed.has(i)) return;
  const r = await window._fb.revealCell(mGameId, i);
  mRevealed.add(i);
  if(r.isMine) {
    mGameActive = false; mMineIndices = r.mineIndices; mRenderGrid();
    setTimeout(() => document.getElementById('mOverlay').classList.add('show'), 1000);
  } else { mRenderGrid(); }
}

async function mCashout() {
  const r = await window._fb.cashout(mGameId);
  balance = r.newBalanceCents; mGameActive = false; mMineIndices = r.mineIndices;
  updateAllBalances(); mRenderGrid();
  document.getElementById('mCashoutBtn').classList.remove('visible');
  setTimeout(() => document.getElementById('mOverlay').classList.add('show'), 1000);
}

// CRATE & COIN STUBS
async function cOpenCrate() {
  const bet = coinsToCents(document.getElementById('cBetInput').value);
  const r = await window._fb.simpleGame('crate', bet);
  balance = r.newBalanceCents; updateAllBalances();
  document.getElementById('crateDisplay').textContent = "RESULT: " + r.roll.toFixed(2);
}

let flChoice = 'heads';
function flPick(s) { flChoice = s; }
async function flFlip() {
  const bet = coinsToCents(document.getElementById('flBetInput').value);
  const r = await window._fb.simpleGame('coinflip', bet, flChoice);
  const coin = document.getElementById('flCoin');
  coin.style.transition = 'transform 1s';
  coin.style.transform = r.outcome === 'heads' ? 'rotateY(0)' : 'rotateY(180deg)';
  setTimeout(() => { balance = r.newBalanceCents; updateAllBalances(); }, 1000);
}
</script>
</body>
</html>
